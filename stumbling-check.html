var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急：急性発症＋歩行不能
  if (answers.onset === "sudden" && answers.daily_impact === "cant_walk") { return "emergency_acute"; }

  // 正常圧水頭症の疑い
  if (answers.associated === "cognitive_incont") { return "urgent_nph"; }

  // パーキンソン病の疑い
  if (answers.associated === "tremor_slow") { return "urgent_parkinson"; }
  if (answers.pattern === "freezing") { return "urgent_parkinson"; }

  // 頚椎症性脊髄症の疑い
  if (answers.associated === "hand_clumsy") { return "urgent_cervical_myelopathy"; }

  // 小脳・脳幹の疑い
  if (answers.pattern === "sway" && answers.onset === "sudden") { return "urgent_cerebellar"; }

  // 腓骨神経麻痺
  if (answers.pattern === "one_foot" && answers.onset === "sudden") { return "soon_peroneal"; }

  // 多発神経障害
  if (answers.pattern === "dark_uneven" && answers.associated === "numbness_feet") { return "soon_polyneuropathy"; }
  if (answers.associated === "numbness_feet" && answers.age_risk === "elderly_diabetes") { return "soon_diabetic_neuro"; }

  // 整形外科的問題
  if (answers.associated === "pain_joint") { return "soon_orthopedic"; }

  // サルコペニア・フレイル
  if (answers.pattern === "general" && (answers.age_risk === "elderly" || answers.age_risk === "elderly_diabetes")) { return "soon_sarcopenia"; }

  // 片足の問題（慢性）
  if (answers.pattern === "one_foot") { return "soon_one_foot"; }

  // ふらつき（慢性）
  if (answers.pattern === "sway") { return "soon_ataxia"; }

  // 転倒リスク高い
  if (answers.fall_history === "repeated") { return "soon_fall_risk"; }

  // 軽度
  return "watch";
}
