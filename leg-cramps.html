  <h1>足のつりセルフチェック</h1>
</div>

<div class="disclaimer">
  このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="container">
  <!-- 質問群 -->
  <div id="questionArea"></div>
  <!-- 結果 -->
  <div id="resultArea" class="hidden"></div>
</div>

<script>
var questions = [
  {
    id: "frequency",
    title: "足がつる頻度はどのくらいですか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "rare", label: "月に1〜2回以下" },
      { id: "weekly", label: "週に1回くらい" },
      { id: "frequent", label: "週に2回以上" },
      { id: "daily", label: "ほぼ毎日" }
    ]
  },
  {
    id: "timing",
    title: "足がつるのはどんな時ですか？",
    subtitle: "",
    options: [
      { id: "sleep", label: "寝ている時・明け方" },

  {

      { id: "multiple", label: "足以外（手・腕など）もつることがある" }

  },
  {
    id: "other_symptoms",
    title: "足のつり以外に気になる症状はありますか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "none", label: "つるだけで、他に気になることはない" },
      { id: "numbness", label: "しびれやピリピリ感がある" },
      { id: "weakness", label: "足の力が入りにくい・筋肉が痩せてきた" },
      { id: "swelling", label: "足がむくむ・腫れて熱を持つ" },

  {
    id: "risk_factors",
    title: "以下に当てはまるものはありますか？",
    subtitle: "最も当てはまるものを選んでください",

    id: "medication",
    title: "現在飲んでいる薬はありますか？",
    subtitle: "",

      { id: "diuretic", label: "利尿薬を飲んでいる" },
      { id: "statin", label: "コレステロールの薬（スタチン）を飲んでいる" },
      { id: "other_meds", label: "その他の薬を飲んでいる" },
      { id: "no_meds", label: "薬は飲んでいない" }
    ]
  }
];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + ' / ' + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";

  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急（赤）: 筋力低下・筋萎縮、または足の腫れ・熱
  if (answers.other_symptoms === "weakness") {
    return "emergency";
  }
  if (answers.other_symptoms === "swelling") {
    return "emergency_dvt";
  }

  // 早めに受診（黄〜赤）
  if (answers.other_symptoms === "numbness") {
    if (answers.risk_factors === "diabetes") {
      return "urgent_neuropathy";
    }
    return "urgent";
  }
  if (answers.timing === "walking" && answers.other_symptoms === "backpain") {
    return "urgent_spinal";
  }
  if (answers.timing === "walking") {
    return "urgent_spinal";
  }
  if (answers.frequency === "daily" || answers.frequency === "frequent") {
    if (answers.location === "multiple") {
      return "urgent";
    }
    return "soon";
  }

  // 薬剤性疑い
  if (answers.medication === "diuretic" || answers.medication === "statin") {
    return "medication";
  }

  // 生活習慣・脱水
  if (answers.risk_factors === "dehydration") {
    return "lifestyle";
  }
  if (answers.risk_factors === "thyroid") {
    return "soon_thyroid";
  }

  // 様子見OK
  return "watch";
}

function getLabelFor(qId, optId) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].id === qId) {
      for (var j = 0; j < questions[i].options.length; j++) {
        if (questions[i].options[j].id === optId) {
          return questions[i].options[j].label;
        }
      }
    }
  }
  return "";
}

function restart() {
  currentStep = 0;
  answers = {};
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("questionArea").classList.remove("hidden");
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
