    options: [
      { id: "spinning", label: "\u3050\u308B\u3050\u308B\u56DE\u308B\uFF08\u81EA\u5206\u304B\u5468\u308A\u304C\u56DE\u8EE2\u3059\u308B\uFF09" },
      { id: "floating", label: "\u30D5\u30EF\u30D5\u30EF\u3059\u308B\u30FB\u3075\u3089\u3064\u304F" },

    ]

    ]
  }

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 最緊急：脳卒中の可能性
  if (answers.danger_signs === "headache") { return "emergency_stroke_sah"; }
  if (answers.danger_signs === "neuro") { return "emergency_stroke"; }

  // 緊急：小脳・脳幹梗塞の疑い
  if (answers.danger_signs === "walk") { return "urgent_cerebellar"; }
  if (answers.type === "spinning" && answers.duration === "days" && answers.trigger === "none") { return "urgent_cerebellar"; }

  // 前庭神経炎
  if (answers.type === "spinning" && answers.duration === "days") { return "soon_vestibular_neuritis"; }

  // メニエール病の疑い
  if (answers.type === "spinning" && answers.duration === "minutes_hours" && (answers.hearing === "tinnitus_hearing" || answers.hearing === "fullness")) { return "soon_meniere"; }

  // BPPV（良性発作性頭位めまい症）
  if (answers.type === "spinning" && answers.duration === "seconds" && answers.trigger === "position") { return "bppv"; }

  // 起立性低血圧
  if (answers.type === "blackout" && answers.trigger === "standing") { return "orthostatic"; }

  // 持続性浮動性めまい
  if (answers.type === "floating" && answers.frequency === "continuous") { return "soon_persistent_floating"; }

  // 回転性めまい（その他）
  if (answers.type === "spinning") { return "soon_spinning_other"; }

  // 立ちくらみ（その他）
  if (answers.type === "blackout") { return "soon_presyncope"; }

  // 浮動性めまい（その他）
  return "watch_floating";
}

      }
    }
  }
  return "";
}
