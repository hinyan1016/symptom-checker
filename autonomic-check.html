  <h1>自律神経セルフチェック</h1>
</div>

<div class="disclaimer">
  このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。

</div>

<script>
var questions = [
  {
    id: "main_symptom",
    title: "最も気になる症状はどれですか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "dizziness", label: "めまい・立ちくらみ・ふらつき" },
      { id: "palpitation", label: "動悸・胸のドキドキ" },

      { id: "sleep", label: "不眠・眠りが浅い" },
      { id: "digestive", label: "吐き気・胃もたれ・便秘や下痢" },
      { id: "multiple", label: "上記の複数が当てはまる" }

  {

      { id: "good", label: "規則正しい生活をしている" }
    ]
  }
];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";

  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急: 危険なサインあり
  if (answers.red_flags === "syncope") {
    return "emergency_syncope";
  }
  if (answers.red_flags === "chest_pain") {
    return "emergency_cardiac";
  }
  if (answers.red_flags === "weight_loss") {
    return "urgent_weight";
  }
  if (answers.red_flags === "night_sweat") {
    return "urgent_sweat";
  }

  // 急性発症
  if (answers.onset === "sudden" && answers.main_symptom === "dizziness") {
    return "urgent_dizziness";
  }

  // 検査で異常あり
  if (answers.tests_done === "abnormal") {
    return "followup";
  }

  // 精神面の問題
  if (answers.mental === "depressed" || answers.mental === "anxious") {
    return "mental";
  }

  // 検査未実施
  if (answers.tests_done === "none_done" || answers.tests_done === "partial") {
    return "need_tests";
  }

  // 検査済み + 精神面OK + 生活習慣の問題
  if (answers.lifestyle === "irregular" || answers.lifestyle === "sedentary" || answers.lifestyle === "overwork") {
    return "lifestyle";
  }

  // すべてOK
  return "watch";
}

function getLabelFor(qId, optId) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].id === qId) {
      for (var j = 0; j < questions[i].options.length; j++) {
        if (questions[i].options[j].id === optId) {
          return questions[i].options[j].label;
        }
      }
    }
  }
  return "";
}

function restart() {
  currentStep = 0;
  answers = {};
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("questionArea").classList.remove("hidden");
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
