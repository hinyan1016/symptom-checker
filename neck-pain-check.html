<body>
<div class="app-header">
  <div class="series">その症状、大丈夫？ #09</div>
  <h1>首の痛みセルフチェック</h1>
</div>
<div class="disclaimer">このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="container">
  <div id="questionArea"></div>
  <div id="resultArea" class="hidden"></div>
</div>
<script>
var questions = [
  {
    id: "main_symptom",
    title: "首の痛みに加えて、最も気になる症状はどれですか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "numbness", label: "腕や手にしびれがある" },
      { id: "dexterity", label: "ボタンが留めにくい・箸が使いにくい" },
      { id: "gait", label: "歩きにくい・ふらつく" },
      { id: "headache", label: "頭痛を伴う" },
      { id: "stiffness", label: "首が動かせない・固まっている" },
      { id: "pain_only", label: "首の痛みだけで他に症状はない" }

  {

    subtitle: "できるだけ速く繰り返して回数を数えてください",
    options: [
      { id: "normal", label: "20回以上できた" },
      { id: "slow", label: "20回未満だった" },
      { id: "not_done", label: "試していない・わからない" }
    ]
  }
];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  if (answers.red_flags === "fever_stiff") { return "emergency_meningitis"; }
  if (answers.red_flags === "thunderclap") { return "emergency_dissection"; }
  if (answers.red_flags === "trauma") { return "emergency_trauma"; }
  if (answers.red_flags === "progressive") { return "urgent_progressive"; }

  if (answers.main_symptom === "dexterity" || answers.guppa === "slow") { return "urgent_myelopathy"; }
  if (answers.main_symptom === "gait") { return "urgent_myelopathy"; }
  if (answers.radiation === "legs_too") { return "urgent_myelopathy"; }
  if (answers.radiation === "both_hands") { return "urgent_myelopathy"; }

  if (answers.radiation === "one_arm" && answers.aggravating === "extension") { return "soon_radiculopathy"; }
  if (answers.main_symptom === "numbness" && answers.radiation === "one_arm") { return "soon_radiculopathy"; }

  if (answers.main_symptom === "headache" && answers.onset === "sudden") { return "urgent_headache"; }

  if (answers.onset === "months" && answers.main_symptom !== "pain_only") { return "soon_chronic"; }
  if (answers.onset === "weeks") { return "soon_persistent"; }

  if (answers.onset === "morning" || answers.aggravating === "morning_only") { return "watch_stiff_neck"; }
  if (answers.aggravating === "desk") { return "watch_posture"; }

  return "watch";
}

function getLabelFor(qId, optId) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].id === qId) {
      for (var j = 0; j < questions[i].options.length; j++) {
        if (questions[i].options[j].id === optId) { return questions[i].options[j].label; }
      }
    }
  }
  return "";
}

function restart() {
