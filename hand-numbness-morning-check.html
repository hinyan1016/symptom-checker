var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 最緊急：脳卒中
  if (answers.fingers === "face_leg_too") { return "emergency_stroke"; }
  if (answers.weakness === "face_speech") { return "emergency_stroke"; }
  if (answers.timing === "sudden" && answers.fingers === "all_fingers" && answers.weakness !== "none") { return "emergency_stroke"; }

  // 橈骨神経麻痺
  if (answers.weakness === "wrist_drop") { return "soon_radial"; }

  // 筋萎縮
  if (answers.weakness === "muscle_wasting") { return "soon_muscle_wasting"; }

  // 手根管症候群
  if (answers.fingers === "thumb_index_middle" && answers.timing === "night_morning") { return "carpal_tunnel"; }
  if (answers.fingers === "thumb_index_middle" && answers.relief === "shake") { return "carpal_tunnel"; }
  if (answers.fingers === "thumb_index_middle") { return "carpal_tunnel_likely"; }

  // 肘部管症候群
  if (answers.fingers === "pinky_ring" && answers.timing === "elbow_bent") { return "cubital_tunnel"; }
  if (answers.fingers === "pinky_ring") { return "cubital_tunnel_likely"; }

  // 胸郭出口症候群
  if (answers.fingers === "all_fingers" && answers.timing === "arm_position") { return "thoracic_outlet"; }
  if (answers.arm_too === "arm_too" && answers.timing === "arm_position") { return "thoracic_outlet"; }

  // 頚椎症
  if (answers.timing === "neck_move") { return "cervical_radiculopathy"; }
  if (answers.fingers === "arm_too" && answers.weakness === "neck_pain") { return "cervical_radiculopathy"; }
  if (answers.weakness === "neck_pain") { return "cervical_possible"; }

  // 慢性・毎晩
  if (answers.frequency === "every_night" || answers.frequency === "constant") { return "soon_frequent"; }

  // その他
  return "general";
}
