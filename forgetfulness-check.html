var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 高リスク：出来事自体を忘れる＋日常生活困難
  if (answers.recall === "event" && answers.daily_life === "severe") { return "urgent_dementia_likely"; }
  if (answers.recall === "event") { return "urgent_event_forgetting"; }

  // 高リスク：急速悪化
  if (answers.progression === "rapid") { return "urgent_rapid"; }

  // 高リスク：見当識障害
  if (answers.personality === "disoriented") { return "urgent_disoriented"; }

  // 中リスク：日常生活に支障＋本人気づかず
  if (answers.daily_life === "severe") { return "soon_daily_impact"; }
  if (answers.daily_life === "moderate" && answers.repeat === "frequent") { return "soon_daily_impact"; }

  // 中リスク：家族だけが気になる＋繰り返し
  if (answers.who === "family" && answers.repeat === "frequent") { return "soon_family_concern"; }

  // 中リスク：性格変化
  if (answers.personality === "irritable") { return "soon_personality"; }
  if (answers.personality === "apathy" && answers.progression === "slow") { return "soon_apathy"; }

  // 軽度認知障害の可能性
  if (answers.recall === "sometimes" && answers.progression === "slow") { return "mci_possible"; }
  if (answers.daily_life === "moderate") { return "mci_possible"; }

  // 加齢性
  if (answers.recall === "yes" && answers.daily_life === "none" && answers.who === "self") { return "normal_aging"; }
  if (answers.recall === "yes" && answers.daily_life === "minor") { return "normal_aging"; }

  // その他
  return "general_checkup";
}
