var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急：脳卒中等の除外が必要
  if (answers.emergency_signs === "sudden_one_side") { return "emergency_stroke_rule_out"; }
  if (answers.emergency_signs === "fever_headache") { return "emergency_other"; }
  if (answers.emergency_signs === "rapid_progression") { return "urgent_rapid"; }

  // 検査で異常あり
  if (answers.tests === "abnormal") { return "follow_existing"; }

  // FND示唆パターン
  if (answers.tests === "normal" && answers.variability === "attention") { return "fnd_likely"; }
  if (answers.tests === "normal" && answers.variability === "variable" && answers.onset === "after_stress") { return "fnd_likely"; }
  if (answers.tests === "mismatch") { return "fnd_likely"; }

  // けいれん様
  if (answers.symptoms === "seizure_like" && answers.tests === "normal") { return "pnes_possible"; }

  // 未検査
  if (answers.tests === "not_done" && answers.symptoms === "weakness") { return "needs_evaluation"; }
  if (answers.tests === "not_done" && answers.symptoms === "seizure_like") { return "needs_evaluation"; }
  if (answers.tests === "not_done") { return "needs_checkup"; }

  // ストレス反応（神経症状なし）
  if (answers.symptoms === "general" && answers.stress_history === "clear_trauma") { return "stress_reaction"; }
  if (answers.symptoms === "general" && answers.stress_history === "depression") { return "mental_health"; }
  if (answers.symptoms === "general") { return "general_fatigue"; }

  // FNDの可能性あり
  if (answers.tests === "normal" && answers.onset === "after_stress") { return "fnd_possible"; }
  if (answers.tests === "normal") { return "fnd_possible"; }

  return "needs_checkup";
}
