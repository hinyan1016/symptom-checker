var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 最緊急：雷鳴頭痛
  if (answers.onset === "thunderclap") { return "emergency_thunderclap"; }
  // 最緊急：重大レッドフラグ
  if (answers.red_flags === "consciousness") { return "emergency_consciousness"; }
  if (answers.red_flags === "neuro") { return "emergency_neuro"; }
  if (answers.red_flags === "neck_fever") { return "emergency_meningitis"; }
  if (answers.red_flags === "seizure") { return "emergency_seizure"; }

  // 緊急
  if (answers.onset === "sudden") { return "urgent_sudden"; }
  if (answers.red_flags === "vomiting") { return "urgent_vomiting"; }
  if (answers.pattern === "worsening") { return "urgent_worsening"; }
  if (answers.age === "over50_first") { return "urgent_over50_first"; }

  // 早めの受診
  if (answers.pattern === "new_type") { return "soon_new"; }
  if (answers.pattern === "changed") { return "soon_changed"; }
  if (answers.medication === "overuse") { return "soon_overuse"; }

  // 群発頭痛の疑い
  if (answers.type === "orbital") { return "soon_cluster"; }

  // 様子見
  return "watch";
}
