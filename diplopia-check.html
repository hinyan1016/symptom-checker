<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2C5AA0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>複視セルフチェック ― その症状、大丈夫？</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "BIZ UDPGothic", sans-serif;
  background: #f0f4f8;
  color: #333;
  line-height: 1.6;
  min-height: 100vh;
}
.app-header {
  background: linear-gradient(135deg, #1B3A5C, #2C5AA0);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
}
.app-header h1 { font-size: 1.3rem; margin-bottom: 4px; }
.app-header .series { font-size: 0.8rem; opacity: 0.8; }
.disclaimer {
  background: #fff3cd;
  border-left: 4px solid #ffc107;
  padding: 12px 16px;
  margin: 12px 16px;
  border-radius: 4px;
  font-size: 0.85rem;
  color: #856404;
}
.container { max-width: 600px; margin: 0 auto; padding: 0 16px 80px; }
.step-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin: 16px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.step-number {
  display: inline-block;
  background: #2C5AA0;
  color: #fff;
  font-size: 0.8rem;
  padding: 2px 10px;
  border-radius: 12px;
  margin-bottom: 8px;
}
.step-card h2 {
  font-size: 1.1rem;
  color: #1B3A5C;
  margin-bottom: 12px;
}
.step-card p {
  font-size: 0.95rem;
  color: #555;
  margin-bottom: 12px;
}
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #dee2e6;
  border-radius: 8px;
  background: #fff;
  font-size: 1rem;
  font-family: inherit;
  color: #333;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.option-btn:hover { border-color: #2C5AA0; background: #f0f6ff; }
.option-btn.selected { border-color: #2C5AA0; background: #e8f4fd; color: #1B3A5C; font-weight: bold; }
.hidden { display: none; }
.result-card {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px;
  margin: 16px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.result-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 1.1rem;
  font-weight: bold;
  margin-bottom: 12px;
}
.badge-red { background: #f8d7da; color: #c0392b; }
.badge-yellow { background: #fff3cd; color: #856404; }
.badge-green { background: #d4edda; color: #155724; }
.result-title { font-size: 1.2rem; color: #1B3A5C; margin-bottom: 8px; }
.result-desc { font-size: 0.95rem; color: #555; margin-bottom: 16px; }
.result-action {
  background: #f8f9fa;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 12px;
}
.result-action strong { color: #2C5AA0; }
.result-note {
  font-size: 0.85rem;
  color: #888;
  border-top: 1px solid #eee;
  padding-top: 12px;
  margin-top: 12px;
}
.restart-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: #2C5AA0;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  margin-top: 12px;
}
.restart-btn:hover { background: #1B3A5C; }
.progress-bar {
  height: 4px;
  background: #dee2e6;
  margin: 0 16px;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #2C5AA0;
  transition: width 0.3s;
  border-radius: 2px;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="series">その症状、大丈夫？ #07</div>
  <h1>複視セルフチェック</h1>
</div>

<div class="disclaimer">
  このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="container">
  <div id="questionArea"></div>
  <div id="resultArea" class="hidden"></div>
</div>

<script>
var questions = [
  {
    id: "cover_test",
    title: "片目テスト：片目を閉じるとどうなりますか？",
    subtitle: "右目・左目をそれぞれ閉じて確認してください",
    options: [
      { id: "binocular", label: "片目だと1つに見えるが、両目だと二重になる" },
      { id: "monocular", label: "片目でも二重に見える" },
      { id: "unsure", label: "よくわからない・確認が難しい" }
    ]
  },
  {
    id: "onset",
    title: "複視はいつ頃から始まりましたか？",
    subtitle: "",
    options: [
      { id: "sudden", label: "突然始まった（今日〜数日前）" },
      { id: "gradual", label: "徐々に悪化してきた（数週間〜数ヶ月）" },
      { id: "fluctuating", label: "良くなったり悪くなったりする" },
      { id: "evening", label: "夕方〜夜にかけて悪化する" }
    ]
  },
  {
    id: "red_flags",
    title: "以下のいずれかに当てはまりますか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "headache", label: "激しい頭痛を伴う" },
      { id: "pupil", label: "瞳孔の大きさが左右で違う" },
      { id: "slurred", label: "ろれつが回りにくい・片側の手足が動きにくい" },
      { id: "ptosis_pupil", label: "まぶたが下がる＋瞳孔が広がっている" },
      { id: "none", label: "いずれも当てはまらない" }
    ]
  },
  {
    id: "associated",
    title: "複視に加えて、他の症状はありますか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "ptosis", label: "まぶたが下がってくる（眼瞼下垂）" },
      { id: "eye_bulge", label: "眼球が出てきた気がする（眼球突出）" },
      { id: "fatigue", label: "体がだるい・飲み込みにくさがある" },
      { id: "pain", label: "目の奥が痛い" },
      { id: "none_assoc", label: "複視だけで他に症状はない" }
    ]
  },
  {
    id: "direction",
    title: "どの方向を見たときに二重が強くなりますか？",
    subtitle: "わかる範囲で選んでください",
    options: [
      { id: "lateral", label: "横を見たとき（左右どちらか）" },
      { id: "updown", label: "上や下を見たとき" },
      { id: "all", label: "どの方向でも二重に見える" },
      { id: "unknown", label: "方向はよくわからない" }
    ]
  },
  {
    id: "history",
    title: "以下に当てはまるものはありますか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "diabetes", label: "糖尿病がある・血糖値が高いと言われた" },
      { id: "thyroid", label: "甲状腺の病気がある（バセドウ病など）" },
      { id: "hypertension", label: "高血圧がある" },
      { id: "autoimmune", label: "自己免疫疾患がある" },
      { id: "none_hist", label: "特にない" }
    ]
  }
];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";

  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 単眼性複視 → 眼科
  if (answers.cover_test === "monocular") {
    return "monocular";
  }

  // 緊急: 頭痛＋突然の複視 → 脳動脈瘤破裂
  if (answers.red_flags === "headache") {
    return "emergency_aneurysm";
  }
  // 緊急: まぶた下垂＋瞳孔散大 → 脳動脈瘤
  if (answers.red_flags === "ptosis_pupil") {
    return "emergency_cn3";
  }
  // 緊急: 脳卒中徴候
  if (answers.red_flags === "slurred") {
    return "emergency_stroke";
  }
  // 緊急: 瞳孔異常
  if (answers.red_flags === "pupil") {
    return "urgent_pupil";
  }

  // 夕方悪化＋まぶた下垂 → 重症筋無力症の疑い
  if (answers.onset === "evening" && answers.associated === "ptosis") {
    return "urgent_mg_strong";
  }
  // 夕方悪化 or まぶた下垂 → 重症筋無力症の可能性
  if (answers.onset === "evening" || answers.associated === "ptosis") {
    return "urgent_mg";
  }
  // 日内変動＋易疲労性
  if (answers.onset === "fluctuating" && answers.associated === "fatigue") {
    return "urgent_mg";
  }

  // 眼球突出 → 甲状腺眼症
  if (answers.associated === "eye_bulge" || answers.history === "thyroid") {
    return "urgent_thyroid";
  }

  // 突然発症
  if (answers.onset === "sudden") {
    return "urgent_sudden";
  }

  // 糖尿病あり
  if (answers.history === "diabetes") {
    return "soon_diabetes";
  }

  // 高血圧あり + 徐々に進行
  if (answers.history === "hypertension" && answers.onset === "gradual") {
    return "soon_vascular";
  }

  // 徐々に悪化
  if (answers.onset === "gradual") {
    return "soon_gradual";
  }

  // よくわからない
  if (answers.cover_test === "unsure") {
    return "check_eye";
  }

  // その他
  return "watch";
}
