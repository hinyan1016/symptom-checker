var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 最緊急：脳卒中の疑い
  if (answers.onset === "sudden" && answers.location === "hemi_face_arm_leg") { return "emergency_stroke"; }
  if (answers.onset === "sudden" && answers.associated === "weakness") { return "emergency_stroke"; }

  // 緊急：脊髄圧迫
  if (answers.associated === "bladder") { return "emergency_spinal"; }
  if (answers.location === "below_level" && answers.onset === "sudden") { return "emergency_spinal"; }

  // 脳神経内科：進行性・拡大するしびれ
  if (answers.location === "hemi_face_arm_leg") { return "neuro_central"; }
  if (answers.location === "below_level") { return "neuro_spinal"; }
  if (answers.progression === "spreading") { return "neuro_progressive"; }
  if (answers.location === "both_feet" && answers.symmetry === "both_symmetric" && answers.associated === "none" && answers.position_effect === "none") { return "neuro_polyneuropathy"; }

  // 整形外科：頚椎・腰椎
  if (answers.position_effect === "neck_move" && answers.associated === "pain_neck") { return "ortho_cervical"; }
  if (answers.position_effect === "neck_move") { return "ortho_cervical"; }
  if (answers.position_effect === "back_move" && answers.associated === "pain_back") { return "ortho_lumbar"; }
  if (answers.position_effect === "back_move") { return "ortho_lumbar"; }
  if (answers.specific_fingers === "specific_fingers" && answers.position_effect === "pressure") { return "ortho_carpal"; }
  if (answers.location === "specific_fingers" && answers.position_effect === "pressure") { return "ortho_carpal"; }
  if (answers.location === "specific_fingers" && answers.associated === "pain_neck") { return "ortho_cervical"; }

  // 内科：代謝性
  if (answers.associated === "metabolic") { return "internal_metabolic"; }
  if (answers.location === "both_feet" && answers.symmetry === "both_symmetric") { return "internal_or_neuro"; }

  // その他
  if (answers.location === "arm_hand" && answers.associated === "pain_neck") { return "ortho_cervical"; }
  if (answers.location === "arm_hand") { return "neuro_or_ortho"; }

  return "general";
}
