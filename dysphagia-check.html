<div class="app-header">
  <a class="back-link" href="index.html">← ツール一覧に戻る</a>
  <div class="series">その症状、大丈夫？ #08</div>
  <h1>嚥下セルフチェック</h1>
</div>

<div class="disclaimer">
  このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="container">
  <div id="questionArea"></div>
  <div id="resultArea" class="hidden"></div>
</div>

<script>
var questions = [
  {
    id: "main_symptom",
    title: "最も気になる症状はどれですか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "choking", label: "食事中にむせることが増えた" },
      { id: "stuck", label: "食べ物がのどに引っかかる感じがする" },
      { id: "pill", label: "薬の錠剤が飲みにくくなった" },
      { id: "liquid", label: "水やお茶でむせやすい" },
      { id: "time", label: "食事に時間がかかるようになった" },
      { id: "voice", label: "食後に声がかすれる" }
    ]
  },
  {
    id: "onset",
    title: "症状はいつ頃から始まりましたか？",
    subtitle: "",
    options: [
      { id: "sudden", label: "突然始まった（今日〜数日前）" },
      { id: "weeks", label: "数週間かけて徐々に悪化" },
      { id: "months", label: "数ヶ月以上かけてゆっくり進行" },
      { id: "fluctuating", label: "良くなったり悪くなったりする" }
    ]
  },
  {
    id: "red_flags",
    title: "以下のいずれかに当てはまりますか？",
    subtitle: "最も当てはまるものを選んでください",
    options: [
      { id: "stroke_signs", label: "めまい・ろれつ障害・片側の麻痺がある" },
      { id: "breathing", label: "食べ物がのどに詰まって呼吸が苦しくなった" },
      { id: "fever", label: "原因不明の発熱を繰り返す" },
      { id: "weight_loss", label: "体重が急に減っている" },
      { id: "none", label: "いずれも当てはまらない" }

  },
  {
    id: "associated",
    title: "嚥下障害に加えて、他の症状はありますか？",

      { id: "weakness", label: "手足の筋力低下やしゃべりにくさがある" },

  {
    id: "timing",
    title: "むせやすいタイミングはありますか？",
    subtitle: "",

      { id: "meal_end", label: "食事の後半にむせが増える" },
      { id: "liquid_only", label: "水分（水・お茶・汁物）でむせる" },
      { id: "solid", label: "固形物が飲み込みにくい" },
      { id: "anytime", label: "食事に関係なくむせることがある" },
      { id: "no_pattern", label: "特にパターンはない" }

  },
  {
    id: "rsst",
    title: "30秒間につばを何回飲み込めますか？",
    subtitle: "反復唾液嚥下テスト：30秒間にできるだけ何回もつばを飲み込んでみてください",
    options: [
      { id: "normal", label: "3回以上飲み込めた" },
      { id: "borderline", label: "2回だった" },
      { id: "impaired", label: "1回以下だった" },
      { id: "not_done", label: "試していない・わからない" }
    ]
  }
];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";

  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急: 脳卒中徴候
  if (answers.red_flags === "stroke_signs") {
    return "emergency_stroke";
  }
  // 緊急: 窒息
  if (answers.red_flags === "breathing") {
    return "emergency_choking";
  }

  // 繰り返す発熱 → 誤嚥性肺炎
  if (answers.red_flags === "fever") {
    return "urgent_aspiration";
  }
  // 体重減少
  if (answers.red_flags === "weight_loss") {
    return "urgent_weight";
  }

  // 突然発症
  if (answers.onset === "sudden") {
    return "urgent_sudden";
  }

  // ALS等の神経変性疾患の疑い
  if (answers.associated === "weakness") {
    return "urgent_neuro";
  }

  // 重症筋無力症の疑い
  if (answers.associated === "ptosis") {
    return "urgent_mg";
  }
  if (answers.timing === "meal_end" && answers.onset === "fluctuating") {
    return "urgent_mg";
  }

  // パーキンソン病の疑い
  if (answers.associated === "tremor") {
    return "urgent_parkinson";
  }

  // 逆流性食道炎
  if (answers.associated === "reflux") {
    return "soon_reflux";
  }

  // 嚥下テスト異常
  if (answers.rsst === "impaired") {
    return "soon_impaired";
  }
  if (answers.rsst === "borderline") {
    return "soon_borderline";
  }

  // 徐々に進行
  if (answers.onset === "months" || answers.onset === "weeks") {
    return "soon_gradual";
  }

  // 水分でむせる
  if (answers.timing === "liquid_only" || answers.main_symptom === "liquid") {
    return "soon_liquid";
  }

  // その他
  return "watch";
}
