var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 最緊急：今起きている＋5分以上
  if (answers.timing === "happening" && answers.duration === "over5min") { return "emergency_status"; }
  if (answers.timing === "happening" && answers.situation === "in_water") { return "emergency_water"; }
  if (answers.timing === "happening") { return "emergency_ongoing"; }

  // 緊急：呼吸なし
  if (answers.post_seizure === "not_breathing") { return "emergency_breathing"; }

  // 緊急：特殊状況
  if (answers.situation === "in_water") { return "emergency_water"; }
  if (answers.situation === "head_injury") { return "emergency_head"; }
  if (answers.situation === "pregnant") { return "emergency_pregnant"; }

  // 緊急：新しい神経症状
  if (answers.post_seizure === "new_neuro") { return "emergency_new_neuro"; }

  // 119番：初めてのけいれん
  if (answers.history === "first_time") { return "call119_first"; }
  if (answers.history === "unknown") { return "call119_first"; }

  // 5分以上 or 不明
  if (answers.duration === "over5min") { return "call119_prolonged"; }
  if (answers.duration === "unknown" && answers.consciousness === "unconscious") { return "call119_prolonged"; }

  // なかなか覚醒しない
  if (answers.post_seizure === "not_waking") { return "urgent_slow_recovery"; }

  // 既知のてんかん＋意識回復
  if (answers.history === "known" && (answers.post_seizure === "recovering_ok" || answers.post_seizure === "already_ok")) { return "known_epilepsy_recovery"; }

  // 熱性けいれん
  if (answers.situation === "fever_child" && answers.duration === "under5min") { return "febrile_seizure"; }

  // その他
  return "general_post";
}
