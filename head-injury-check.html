<div class="disclaimer">このツールは医療行為ではありません。結果は参考情報であり、診断に代わるものではありません。心配な場合は必ず医師にご相談ください。</div>

<script>
var questions = [
  {
    id: "who",

      { id: "adult", label: "成人（16歳以上）" },

      { id: "child_under2", label: "乳幼児（2歳未満）" },

  },
  {
    id: "consciousness",
    title: "意識を失いましたか？",

    subtitle: "",

      { id: "months", label: "数ヶ月前" }

];

var currentStep = 0;
var answers = {};

function renderQuestion() {
  var area = document.getElementById("questionArea");
  var q = questions[currentStep];
  var pct = Math.round((currentStep / questions.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  var html = '<div class="step-card">';
  html += '<span class="step-number">' + "\u8CEA\u554F " + (currentStep + 1) + " / " + questions.length + '</span>';
  html += '<h2>' + q.title + '</h2>';
  if (q.subtitle) { html += '<p>' + q.subtitle + '</p>'; }
  html += '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    html += '<button class="option-btn" onclick="selectAnswer(\'' + q.id + '\',\'' + opt.id + '\')">' + opt.label + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(qId, optId) {
  answers[qId] = optId;
  currentStep++;
  if (currentStep < questions.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("questionArea").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  var urgency = calcUrgency();
  var resultArea = document.getElementById("resultArea");
  resultArea.classList.remove("hidden");
  resultArea.innerHTML = buildResultHTML(urgency);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function calcUrgency() {
  // 緊急（赤）
  if (answers.consciousness === "lost") { return "emergency_loc"; }
  if (answers.symptoms === "seizure") { return "emergency_seizure"; }
  if (answers.symptoms === "severe_headache") { return "emergency_headache"; }
  if (answers.symptoms === "vomiting") { return "emergency_vomiting"; }
  if (answers.symptoms === "weakness") { return "emergency_weakness"; }
  if (answers.symptoms === "fluid") { return "emergency_fluid"; }

  // 高リスク
  if (answers.risk_factors === "anticoagulant") { return "urgent_anticoagulant"; }
  if (answers.risk_factors === "alcohol") { return "urgent_alcohol"; }
  if (answers.mechanism === "high_fall" || answers.mechanism === "traffic") { return "urgent_mechanism"; }

  // 遅発性（慢性硬膜下血腫）
  if ((answers.timing === "weeks" || answers.timing === "months") && answers.who === "elderly") { return "urgent_csdh"; }

  // 小児
  if (answers.who === "child_under2") { return "urgent_infant"; }

  // 軽い頭痛あり
  if (answers.symptoms === "mild_headache") { return "soon_mild"; }

  // 意識がぼーっとした
  if (answers.consciousness === "confused") { return "urgent_confused"; }

  // 症状なし
  return "watch";
}

function getLabelFor(qId, optId) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].id === qId) {

        if (questions[i].options[j].id === optId) { return questions[i].options[j].label; }
      }
    }
  }
  return "";
}

function restart() {
